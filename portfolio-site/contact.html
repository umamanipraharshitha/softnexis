<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Portfolio</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-inner">
      <a href="index.html" class="logo">MyPortfolio</a>
      <button class="nav-toggle" type="button" aria-label="Toggle menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <h2 class="section-title">Get in touch</h2>
        <div class="contact-layout">
          <div class="contact-info">
            <div class="info-item">
              <div>
                <strong>Email</strong>
                <span>hello@myportfolio.dev</span>
              </div>
            </div>
            <div class="info-item">
              <div>
                <strong>Location</strong>
                <span>India</span>
              </div>
            </div>
            <div class="info-item">
              <div>
                <strong>Availability</strong>
                <span>Open to internships &amp; frontend roles</span>
              </div>
            </div>
          </div>

          <form class="contact-form" action="#" method="post">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" placeholder="Your name" required />
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" placeholder="you@email.com" required />
            </div>
            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" name="message" placeholder="Write your message..." required></textarea>
            </div>
            <button type="submit" class="btn">Send message</button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 MyPortfolio · <a href="index.html">Back to home</a></p>
    </div>
  </footer>

  <script>
    const toggle = document.querySelector(".nav-toggle");
    const nav = document.querySelector(".nav-links");
    toggle.addEventListener("click", () => {
      const open = nav.classList.toggle("open");
      toggle.setAttribute("aria-expanded", open);
    });

    document.querySelector(".contact-form").addEventListener("submit", (e) => {
      e.preventDefault();
      alert("Thanks! This is a demo form — connect a backend to send real messages.");
    });
  </script>
</body>
</html>
